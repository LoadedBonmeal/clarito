name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── macOS arm64 (native runner — macos-14 is Apple Silicon) ──────────────────
  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target (arm64)
        run: rustup target add aarch64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # arm64 runner → request an arm64 JDK so jlink produces an arm64 JRE
      - name: Setup Java 17 (arm64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          architecture: arm64

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: Frontend tests
        run: pnpm test

      - name: Rust fmt check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test --lib
        working-directory: src-tauri

      - name: Stage DUK validator jars
        shell: bash
        run: |
          mkdir -p src-tauri/resources/duk
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            curl -fsSL "${{ secrets.DUK_JARS_URL }}" -o /tmp/duk.zip
            unzip -q /tmp/duk.zip -d src-tauri/resources/duk
          else
            echo "::warning::DUK_JARS_URL not set — building UNBUNDLED (no local DUK). Set the secret to ship bundled installers."
            mkdir -p src-tauri/resources/jre-min/bin
            echo "unbundled placeholder" > src-tauri/resources/jre-min/.keep
            echo "unbundled placeholder" > src-tauri/resources/duk/.keep
          fi

      - name: Build minimal JRE (jlink, arm64)
        shell: bash
        run: |
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            JAVA_HOME="$JAVA_HOME" bash scripts/jlink-jre.sh
          else
            echo "::warning::Skipping jlink — unbundled build (no DUK_JARS_URL)."
          fi

      - name: Build (unsigned, arm64)
        run: pnpm tauri build --target aarch64-apple-darwin --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # Best-effort smoke: confirm the JRE was bundled and is runnable
      - name: Smoke — bundled JRE sanity
        shell: bash
        run: |
          JAVA_BIN=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Clarito.app \
            -name java -path '*jre-min*' 2>/dev/null | head -1)
          if [ -n "$JAVA_BIN" ]; then
            echo "Found bundled JRE: $JAVA_BIN"
            "$JAVA_BIN" -version && echo "::notice::Bundled JRE OK (arm64)"
          else
            echo "::warning::Bundled JRE not found in .app — check resources glob"
          fi || true

      # Unsigned dev artifact — NOT for distribution. Signed builds come from release.yml (tag v*).
      - name: Upload DMG (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: RoFactura-macOS-arm64-unsigned-dev
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  # ── macOS x64 ─────────────────────────────────────────────────────────────────
  # NOTE: macos-14 runners are arm64 (Apple Silicon). Producing an x86_64 JRE via
  # jlink on an arm64 runner requires an x86_64 JDK. setup-java@v4 with
  # architecture: x64 will attempt to install a Temurin x64 JDK; if Homebrew /
  # the runner environment provides a Rosetta-capable x64 JDK this will work,
  # otherwise the jlink step falls back gracefully (exit 0 on failure with a
  # warning). For a guaranteed x86_64 JRE use a macos-13 (Intel) runner instead.
  build-macos-x64:
    name: macOS x64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target (x86_64)
        run: rustup target add x86_64-apple-darwin

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # Request an x64 JDK so jlink produces an x86_64 JRE.
      # On an arm64 runner this relies on Rosetta / the JDK download providing
      # an x86_64 binary; best-effort — see note above.
      - name: Setup Java 17 (x64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          architecture: x64

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: Frontend tests
        run: pnpm test

      - name: Rust fmt check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test --lib
        working-directory: src-tauri

      - name: Stage DUK validator jars
        shell: bash
        run: |
          mkdir -p src-tauri/resources/duk
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            curl -fsSL "${{ secrets.DUK_JARS_URL }}" -o /tmp/duk.zip
            unzip -q /tmp/duk.zip -d src-tauri/resources/duk
          else
            echo "::warning::DUK_JARS_URL not set — building UNBUNDLED (no local DUK). Set the secret to ship bundled installers."
            mkdir -p src-tauri/resources/jre-min/bin
            echo "unbundled placeholder" > src-tauri/resources/jre-min/.keep
            echo "unbundled placeholder" > src-tauri/resources/duk/.keep
          fi

      - name: Build minimal JRE (jlink, x64)
        shell: bash
        run: |
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            JAVA_HOME="$JAVA_HOME" bash scripts/jlink-jre.sh
          else
            echo "::warning::Skipping jlink — unbundled build (no DUK_JARS_URL)."
          fi

      - name: Build (unsigned, x64)
        run: pnpm tauri build --target x86_64-apple-darwin --bundles dmg
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      # Best-effort smoke: confirm the JRE was bundled and is runnable
      - name: Smoke — bundled JRE sanity
        shell: bash
        run: |
          JAVA_BIN=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos/Clarito.app \
            -name java -path '*jre-min*' 2>/dev/null | head -1)
          if [ -n "$JAVA_BIN" ]; then
            echo "Found bundled JRE: $JAVA_BIN"
            "$JAVA_BIN" -version && echo "::notice::Bundled JRE OK (x64)" || true
          else
            echo "::warning::Bundled JRE not found in .app — check resources glob"
          fi || true

      # Unsigned dev artifact — NOT for distribution. Signed builds come from release.yml (tag v*).
      - name: Upload DMG (x64)
        uses: actions/upload-artifact@v4
        with:
          name: RoFactura-macOS-x64-unsigned-dev
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  # ── Windows x64 ───────────────────────────────────────────────────────────────
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Java 17 (Windows x64)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          architecture: x64

      - name: Install dependencies
        run: pnpm install

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: Frontend tests
        run: pnpm test

      - name: Rust fmt check
        run: cargo fmt --check
        working-directory: src-tauri

      - name: Rust clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
        working-directory: src-tauri

      - name: Rust tests
        run: cargo test --lib
        working-directory: src-tauri

      - name: Stage DUK validator jars
        shell: bash
        run: |
          mkdir -p src-tauri/resources/duk
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            curl -fsSL "${{ secrets.DUK_JARS_URL }}" -o /tmp/duk.zip
            unzip -q /tmp/duk.zip -d src-tauri/resources/duk
          else
            echo "::warning::DUK_JARS_URL not set — building UNBUNDLED (no local DUK). Set the secret to ship bundled installers."
            mkdir -p src-tauri/resources/jre-min/bin
            echo "unbundled placeholder" > src-tauri/resources/jre-min/.keep
            echo "unbundled placeholder" > src-tauri/resources/duk/.keep
          fi

      - name: Build minimal JRE (jlink, Windows x64)
        shell: bash
        run: |
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            JAVA_HOME="$JAVA_HOME" bash scripts/jlink-jre.sh
          else
            echo "::warning::Skipping jlink — unbundled build (no DUK_JARS_URL)."
          fi

      - name: Build NSIS installer (skip MSI — WiX light.exe flaky on CI)
        run: pnpm tauri build --target x86_64-pc-windows-msvc --bundles nsis

      # Best-effort smoke: confirm the JRE was bundled
      - name: Smoke — bundled JRE sanity
        shell: bash
        run: |
          JAVA_BIN=$(find src-tauri/target/x86_64-pc-windows-msvc/release/bundle \
            -name java.exe -path '*jre-min*' 2>/dev/null | head -1)
          if [ -n "$JAVA_BIN" ]; then
            echo "Found bundled JRE: $JAVA_BIN"
            "$JAVA_BIN" -version && echo "Bundled JRE OK (Windows x64)" || true
          else
            echo "::warning::Bundled JRE not found — check resources glob"
          fi || true

      # Unsigned dev artifact — NOT for distribution. Signed builds come from release.yml (tag v*).
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RoFactura-Windows-x64-unsigned-dev
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
