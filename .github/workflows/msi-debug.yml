# Diagnostic: build ONLY the Windows MSI with --verbose and upload the full log
# even on failure, so we can read the actual WiX light.exe (LGHT####) error that
# tauri-action swallows. Throwaway — delete once MSI is fixed.
name: MSI debug

on:
  workflow_dispatch:
  # Runs automatically on the throwaway diagnostic branch (workflow_dispatch
  # would require this file to exist on the default branch first).
  push:
    branches: ["ci/msi-debug"]

jobs:
  msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Run the MSI bundle verbosely; tee the whole thing to a log and never let
      # a non-zero exit abort before we upload (PowerShell: capture + re-throw).
      - name: Build MSI (verbose)
        shell: pwsh
        run: |
          pnpm tauri build --bundles msi --verbose 2>&1 | Tee-Object -FilePath msi-build.log
          exit $LASTEXITCODE

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msi-build-log
          path: msi-build.log
          if-no-files-found: warn

      # If WiX wrote intermediate .wixobj / .wxs we want them for inspection.
      - name: Upload WiX intermediates
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wix-intermediates
          path: |
            src-tauri/target/release/wix/**/*.wxs
            src-tauri/target/release/wix/**/*.wixobj
            src-tauri/target/release/wix/**/*.wixpdb
          if-no-files-found: warn
