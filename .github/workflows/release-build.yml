# Builds the desktop installers on real OS runners:
#   - Windows → NSIS .exe   (cannot be cross-compiled from macOS)
#   - macOS   → .dmg (aarch64)
# Trigger: manually (workflow_dispatch) or by pushing a tag like v0.7.0.
#
# BUNDLED vs UNBUNDLED: a complete build embeds a minimal JRE (jlink) + the ANAF
# DUKIntegrator validator jars (for LOCAL e-factura XML validation). The jars are
# proprietary/vendored and fetched from the DUK_JARS_URL repo secret. If that
# secret is NOT set, the build is UNBUNDLED — the app still runs and submits to
# ANAF (server-side validation), but local pre-submission validation is absent.
# These installers are UNSIGNED; signed/notarized releases come from release.yml.

name: Release build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

# tauri-action creates a GitHub Release on tag builds → needs write access to contents.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS .exe (single-file installer) + MSI (Group Policy / IT
          # deployment). MSI links cleanly now that installer-metadata strings
          # are ASCII (WiX CP-1252 / ANSI-summary constraint — see tauri.conf).
          - platform: windows-latest
            args: "--bundles nsis,msi"
            java_arch: x64
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"
            java_arch: aarch64

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # JDK for jlink — arch matches the target so the minimal JRE is the right ABI.
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          architecture: ${{ matrix.java_arch }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Vendored ANAF DUKIntegrator jars — only available via the secret.
      - name: Stage DUK validator jars
        shell: bash
        run: |
          mkdir -p src-tauri/resources/duk src-tauri/resources/jre-min
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            curl -fsSL "${{ secrets.DUK_JARS_URL }}" -o /tmp/duk.zip
            unzip -q /tmp/duk.zip -d src-tauri/resources/duk
            echo "DUK_BUNDLED=1" >> "$GITHUB_ENV"
            # Self-heal the per-declaration *Validator.jar overlays straight from static.anaf.ro
            # so the bundle carries the latest D301/D700/D710/D100/D101 (and any future) validators
            # even if the duk.zip secret predates them. DUKIntegrator.jar + the JRE stay from the secret.
            # The per-declaration validators are freely downloadable from ANAF (public AplicatiiDec index).
            mkdir -p src-tauri/resources/duk/lib
            DUK_LIB_DIR="$PWD/src-tauri/resources/duk/lib" bash scripts/fetch-validators.sh \
              || echo "::warning::Validator top-up partially failed — bundle uses the secret's jars as-is."
          else
            echo "::warning::DUK_JARS_URL not set — building UNBUNDLED (no local DUK validator). Set the secret to ship complete installers."
            echo "unbundled placeholder" > src-tauri/resources/jre-min/.keep
            echo "unbundled placeholder" > src-tauri/resources/duk/.keep
          fi

      - name: Build minimal JRE (jlink)
        shell: bash
        run: |
          if [ -n "${{ secrets.DUK_JARS_URL }}" ]; then
            JAVA_HOME="$JAVA_HOME" bash scripts/jlink-jre.sh
          else
            echo "::warning::Skipping jlink — unbundled build (no DUK_JARS_URL)."
          fi

      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Clarito {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: clarito-${{ matrix.platform }}${{ env.DUK_BUNDLED == '1' && '-bundled' || '-unbundled' }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn
