# Builds the desktop installers on real OS runners:
#   - Windows → NSIS .exe + .msi   (cannot be cross-compiled from macOS)
#   - macOS   → .dmg (aarch64)
# Trigger: manually (workflow_dispatch) or by pushing a tag like v0.7.0.
# Artifacts are attached to the run (and to a draft GitHub Release on tags).

name: Release build

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: NSIS .exe only. The MSI (WiX light.exe) bundler chokes on
          # the large bundled JRE tree, and because tauri.conf lists "msi"
          # before "nsis" it would abort the run before the .exe is built.
          - platform: windows-latest
            args: "--bundles nsis"
          - platform: macos-latest
            args: "--target aarch64-apple-darwin --bundles dmg"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          # On tag pushes, attach installers to a draft release:
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Clarito {0}', github.ref_name) || '' }}
          releaseDraft: true

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: clarito-${{ matrix.platform }}
          path: |
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn
